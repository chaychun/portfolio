<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="PP Neue Montreal">
  <rect width="1200" height="630" fill="#fafaf9"/>

  <!-- brand mark, matches favicon -->
  <circle cx="88" cy="88" r="20" fill="#f36208"/>

  <!-- hero copy, mirrors about section -->
  <g fill="#1c1917" font-size="74" font-weight="400" letter-spacing="-1">
    <text x="80" y="332">Hi, I'm <tspan fill="#f36208">Chayut</tspan>. I design and build</text>
    <text x="80" y="424">calm, opinionated software.</text>
  </g>

  <!-- footer rule + meta -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#e7e5e4" stroke-width="1"/>
  <g font-size="22" fill="#57534e" letter-spacing="0.2">
    <text x="80" y="582">chayut.me</text>
    <text x="1120" y="582" text-anchor="end">Portfolio</text>
  </g>
</svg>
